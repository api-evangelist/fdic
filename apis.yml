aid: fdic
name: FDIC
description: >
  The Federal Deposit Insurance Corporation (FDIC) provides the BankFind Suite
  REST API, offering developers programmatic access to publicly available data on
  FDIC-insured financial institutions. The API enables searching, filtering, and
  downloading information about bank institutions, branch locations, financial
  reports, structure change history, failed banks, and summary deposit data.
  All data is provided free of charge under the U.S. public domain license.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/fdic/refs/heads/main/apis.yml

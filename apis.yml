apis:
  - aid: fdic:bankfind
    name: FDIC BankFind Suite API
    description: >
      The FDIC BankFind Suite API (Beta) provides programmatic access to public
      data on FDIC-insured financial institutions, including institution
      demographics and location data, branch office locations, quarterly financial
      information, historical structure change events, failed institution records
      dating from 1934 to present, Summary of Deposits data, and aggregate
      financial summaries subtotaled by year. The API uses Elasticsearch query
      string syntax for flexible filtering and supports JSON and CSV output
      formats with pagination up to 10,000 records per request.
    humanURL: https://banks.data.fdic.gov/bankfind-suite
    baseURL: https://api.fdic.gov/banks
    tags:
      - Banking
      - Financial Institutions
      - Bank Data
      - Branch Locations
      - Financial Reports
      - Failed Banks
      - Deposits
